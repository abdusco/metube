<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>MeTube</title>
  <link rel="stylesheet" href="styles.css">
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.9/dist/cdn.min.js"></script>
</head>
<body x-data="app()" x-init="init()" :data-noop="$watch('theme', () => _applyTheme())">

<!-- ── Header ──────────────────────────────────────────────────────────── -->
<header>
  <div class="header-inner">
    <div class="logo">MeTube</div>

    <div class="metrics">
      <div class="metric active">
        <span x-text="stats.active"></span> active
      </div>
      <div class="metric">
        <span x-text="stats.queued"></span> queued
      </div>
      <div class="metric success">
        <span x-text="stats.done"></span> done
      </div>
      <div class="metric failed">
        <span x-text="stats.failed"></span> failed
      </div>
    </div>

    <div class="theme-btn" role="group" aria-label="Theme">
      <span :class="{ active: theme === 'light' }" @click="setTheme('light')" title="Light">☀</span>
      <span :class="{ active: theme === 'auto' }"  @click="setTheme('auto')"  title="Auto">⬤</span>
      <span :class="{ active: theme === 'dark' }"  @click="setTheme('dark')"  title="Dark">☾</span>
    </div>
  </div>
</header>

<!-- ── Main ────────────────────────────────────────────────────────────── -->
<main>

  <!-- ── Add download ──────────────────────────────────────────────────── -->
  <div class="card">
    <div class="card-title">Add download</div>

    <div x-show="error" class="error-banner" x-text="error"></div>

    <div class="add-row">
      <input
        type="url"
        placeholder="URL"
        x-model="url"
        @keydown.enter="addDownload()"
        autocomplete="off"
        spellcheck="false"
      >
      <button class="btn btn-primary" @click="addDownload()" :disabled="adding || !url.trim()">
        <span x-show="adding" class="spinner"></span>
        <span x-text="adding ? 'Adding…' : 'Add'"></span>
      </button>
    </div>

    <div class="add-options">
      <!-- Type -->
      <div class="field">
        <label>Type</label>
        <select x-model="downloadType" @change="onTypeChange()">
          <option value="video">Video</option>
          <option value="audio">Audio</option>
        </select>
      </div>

      <!-- Codec (video only) -->
      <div class="field" x-show="downloadType === 'video'">
        <label>Codec</label>
        <select x-model="codec">
          <option value="auto">Auto</option>
          <option value="h264">H.264</option>
          <option value="h265">H.265</option>
          <option value="av1">AV1</option>
          <option value="vp9">VP9</option>
        </select>
      </div>

      <!-- Format -->
      <div class="field">
        <label>Format</label>
        <select x-model="format">
          <template x-for="opt in formatOptions" :key="opt.v">
            <option :value="opt.v" x-text="opt.l"></option>
          </template>
        </select>
      </div>

      <!-- Quality -->
      <div class="field">
        <label>Quality</label>
        <select x-model="quality">
          <template x-for="opt in qualityOptions" :key="opt.v">
            <option :value="opt.v" x-text="opt.l"></option>
          </template>
        </select>
      </div>

    </div>

    <details class="advanced">
      <summary>Advanced</summary>

      <label class="advanced-section-header" for="subtitle-langs">Subtitle languages</label>
      <div>
        <input
          id="subtitle-langs"
          type="text"
          x-model="subtitleLangsInput"
          placeholder="en, de, zh-CN  (empty = no subtitles)"
          spellcheck="false"
        >
      </div>

      <div class="advanced-section-header">Cookies</div>
      <a href="https://chromewebstore.google.com/detail/get-cookiestxt-locally/cclelndahbckbenkjhflpdbgdldlbecc" target="_blank" rel="noopener" class="section-help-link">Get cookies.txt extension</a>

      <div class="cookie-file-pick">
        <button class="btn btn-secondary btn-sm" @click="$refs.cookieFileInput.click()" :disabled="cookieUploading">
          Choose file
        </button>
        <input x-ref="cookieFileInput" type="file" accept=".txt" @change="loadCookieFile($event)">
      </div>

      <textarea
        x-model="cookieText"
        placeholder="Paste Netscape cookies.txt content here…"
        rows="5"
      ></textarea>

      <div class="cookie-actions">
        <button
          class="btn btn-primary btn-sm"
          @click="uploadCookieText()"
          :disabled="cookieUploading || !cookieText.trim()"
        >
          <span x-show="cookieUploading" class="spinner"></span>
          Save cookies
        </button>

      </div>

      <template x-if="cookieDomains.length > 0">
        <div>
          <div class="cookie-domains-heading">Saved domains</div>
          <div class="cookie-domain-list">
            <template x-for="domain in cookieDomains" :key="domain">
              <div class="cookie-domain-row">
                <div class="dot active"></div>
                <span x-text="domain"></span>
                <button class="btn-icon danger" @click="deleteCookiesForDomain(domain)" title="Delete">✕</button>
              </div>
            </template>
          </div>
          <button class="btn btn-danger btn-sm" @click="deleteCookies()">Delete all</button>
        </div>
      </template>
      <template x-if="cookieDomains.length === 0">
        <div class="cookie-status">
          <div class="dot"></div>
          <span>No cookies</span>
        </div>
      </template>
    </details>
  </div>

  <!-- ── Downloading ───────────────────────────────────────────────────── -->
  <template x-if="queue.length > 0">
    <div>
      <div class="section-heading">Downloading</div>
      <div class="dl-list">
        <template x-for="dl in queue" :key="dl.id">
          <div class="dl-item">
            <div class="dl-header">
              <div class="dl-title">
                <a :href="dl.url" target="_blank" rel="noopener" x-text="dl.title || dl.url"></a>
              </div>
              <div class="dl-actions">
                <button class="btn-icon" :class="{ active: openLogsId === dl.id }" @click="toggleLogs(dl.id)" title="Logs">≡</button>
                <button class="btn-icon danger" @click="cancelDownload(dl.id)" title="Cancel">✕</button>
              </div>
            </div>

            <div class="progress-wrap">
              <div
                class="progress-bar"
                :class="dl.status"
                :style="`width: ${dl.status === 'running' ? (dl.percent || 0) : 100}%`"
              ></div>
            </div>

            <div class="dl-meta">
              <span x-show="dl.status === 'running'" x-text="`${(dl.percent || 0).toFixed(1)}%`"></span>
              <span x-show="dl.speed"   x-text="formatSpeed(dl.speed)"></span>
              <span x-show="dl.eta"     x-text="`ETA ${formatEta(dl.eta)}`"></span>
              <span x-show="dl.status !== 'running'" x-text="dl.status"></span>
              <span x-text="badge(dl)" class="dl-meta-badge"></span>
            </div>

            <div x-show="openLogsId === dl.id" class="log-panel">
              <pre x-text="(logs[dl.id] || []).join('\n') || '(no logs yet)'"></pre>
            </div>
          </div>
        </template>
      </div>
    </div>
  </template>

  <!-- ── Completed ─────────────────────────────────────────────────────── -->
  <template x-if="done.length > 0">
    <div>
      <div class="section-toolbar">
        <div class="section-heading" style="margin:0">Completed</div>
        <button class="btn btn-danger btn-sm" @click="clearCompletedJobs()">Clear all</button>
      </div>
      <div class="dl-list">
        <template x-for="dl in done" :key="dl.id">
          <div class="dl-item">
            <div class="dl-header">
              <div class="dl-title">
                <span
                  :class="dl.status === 'finished' ? 'badge badge-finished' : 'badge badge-error'"
                  x-text="dl.status === 'finished' ? '✓' : '✕'"
                ></span>
                <a
                  :href="dl.status === 'finished' ? dl.download_url : dl.url"
                  :target="dl.status === 'finished' ? '_blank' : '_blank'"
                  rel="noopener"
                  x-text="dl.title || dl.url"
                ></a>
              </div>
              <div class="dl-actions">
                <a
                  x-show="dl.status === 'finished' && dl.filename"
                  :href="dl.download_url"
                  class="btn-icon"
                  :download="dl.filename"
                  title="Download file"
                >↓</a>
                <button
                  x-show="dl.status === 'error'"
                  class="btn-icon"
                  @click="retryDownload(dl)"
                  title="Retry"
                >↺</button>
                <button class="btn-icon" :class="{ active: openLogsId === dl.id }" @click="toggleLogs(dl.id)" title="Logs">≡</button>
                <button class="btn-icon danger" @click="deleteJob(dl.id)" title="Remove">✕</button>
              </div>
            </div>

            <div class="dl-meta">
              <span x-text="badge(dl)"></span>
              <span x-show="dl.size" x-text="formatBytes(dl.size)"></span>
              <span x-show="dl.finished_at || dl.created_at" x-text="formatTime(dl.finished_at || dl.created_at)"></span>
              <a :href="dl.url" target="_blank" rel="noopener" class="source-link">source</a>
            </div>

            <div x-show="dl.status === 'error'" class="error-banner">Download failed — open logs for details.</div>

            <div x-show="openLogsId === dl.id" class="log-panel">
              <pre x-text="(logs[dl.id] || []).join('\n') || '(no logs yet)'"></pre>
            </div>

            <!-- Subtitle files -->
            <template x-if="dl.subtitle_files && dl.subtitle_files.length">
              <div class="subtitle-list">
                <template x-for="(sf, i) in dl.subtitle_files" :key="i">
                  <div class="dl-meta">
                    <a :href="sf.download_url" x-text="sf.filename" :download="sf.filename"></a>
                    <span x-text="formatBytes(sf.size)"></span>
                  </div>
                </template>
              </div>
            </template>
          </div>
        </template>
      </div>
    </div>
  </template>

  <!-- ── Empty state ───────────────────────────────────────────────────── -->
  <template x-if="queue.length === 0 && done.length === 0">
    <div class="empty">No downloads yet. Paste a URL above to get started.</div>
  </template>


</main>

<script src="main.js"></script>
</body>
</html>
